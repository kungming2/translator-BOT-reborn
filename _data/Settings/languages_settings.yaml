# This settings file stores settings for the title matching routine,
# under /title.

# These are English words that may be erroneously recognized as a
# language due to similarity, and should be ignored for fuzzy matching.
# The comment next to the word indicates what it could be misidentified as.
FUZZY_THRESHOLD: 85  # Minimum fuzz ratio (0–100) for a fuzzy match to be accepted
FUZZ_IGNORE_WORDS:
  - Acehnese
  - Ancient
  - Ancient Mayan
  - Archaic
  - Asian-ish
  - Base
  - Canada
  - Cheese
  - Chopstick
  - Classical Japanese  # Classical Chinese
  - Creek
  - Dish
  - Green
  - Guarani
  - Here
  - Horse
  - Japanese
  - Javanese
  - Kanada
  - Karen
  - Latina  # Latin
  - Ladin  # Latin
  - Ladino  # Latin
  - Latino  # Latin
  - Lmao  # Lao
  - Logo
  - Maay  # Malay
  - Major
  - Malaysia
  - Mardi
  - Maria
  - Mario
  - Morse
  - Nosey
  - Nurse  # Norse
  - Orkish
  - Past
  - Person
  - Peruvian
  - Prussian  # Russian
  - Roman
  - Romani
  - Romanization
  - Romanized
  - Romanji
  - Romanjin
  - Romany
  - Sake
  - Scandinavian
  - Serial
  - Sorbian
  - Sumerian
  - Syrian Arabic
  - Titan
  - Trail
  - Trench
  - Turks
# These are languages for which fuzzing usually doesn't play well.
# As an example, Javanese is obviously very close to Japanese.
FUZZ_IGNORE_LANGUAGE_NAMES:
  - Ancient Egyptian
  - American Sign Language
  - Javanese


# Maps ISO 639-2/T macrolanguage codes to their default individual language
# and the full list of constituent member codes (ISO 639-3).
# Format per entry:
#   <macro>:
#     - <default member>       # the representative/most-used variety
#     - [<member1>, ...]       # all individual language codes under this macro
ISO_MACROLANGUAGES:
  aka:
    - twi  # Twi (default); Akan macrolanguage (Ghana)
    - [fat, twi]  # Fante, Twi
  ara:
    - arb  # Modern Standard Arabic (default); Arabic macrolanguage
    - [aao, abh, abv, acm, acq, acw, acx, acy, adf, aeb, aec, afb, apc, apd, arb, arq, ars, ary, arz, auz, avl, ayh, ayl, ayn, ayp, bbz, pga, shu, ssh]
  aym:
    - ayr  # Central Aymara (default); Aymara macrolanguage (Bolivia/Peru)
    - [ayr, ayc]  # Central Aymara, Southern Aymara
  aze:
    - azj  # North Azerbaijani (default); Azerbaijani macrolanguage
    - [azj, azb]  # North Azerbaijani, South Azerbaijani
  bal:
    - bgp  # Eastern Balochi (default); Balochi macrolanguage
