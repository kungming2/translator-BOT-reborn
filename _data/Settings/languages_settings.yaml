# Maps IETF/BCP 47 language-region tags to the most appropriate ISO 639-3 code
# for that regional variety. Used to disambiguate macrolanguages by country.
# Format: <ISO 639-1>-<ISO 3166-1 alpha-2>: <ISO 639-3>
ISO_LANGUAGE_COUNTRY_ASSOCIATED:
  ar-CY: acy  # Cypriot Arabic
  ar-DZ: arq  # Algerian Arabic
  ar-BH: abv  # Baharna Arabic (Bahrain)
  ar-TD: shu  # Chadian Arabic
  ar-EG: arz  # Egyptian Arabic
  ar-KW: afb  # Gulf Arabic (Kuwait)
  ar-IQ: acm  # Mesopotamian Arabic (Iraq)
  ar-AE: afb  # Gulf Arabic (UAE)
  ar-LB: apc  # North Levantine Arabic (Lebanon)
  ar-SY: apc  # North Levantine Arabic (Syria)
  ar-LY: ayl  # Libyan Arabic
  ar-SA: acw  # Hijazi Arabic (Saudi Arabia)
  ar-OM: acx  # Omani Arabic
  ar-IL: apc  # North Levantine Arabic (Israel)
  ar-PS: apc  # North Levantine Arabic (Palestinian Territories)
  ar-JO: apc  # North Levantine Arabic (Jordan)
  ar-SD: apd  # Sudanese Arabic
  ar-TN: aeb  # Tunisian Arabic
  ay-PE: ayc  # Southern Aymara (Peru)
  de-CH: gsw  # Alemannic / Swiss German
  fa-AF: prs  # Dari (Afghan Persian)
  ff-SN: fuc  # Pulaar (Senegal)
  ff-GM: fuc  # Pulaar (Gambia)
  ff-MR: fuc  # Pulaar (Mauritania)
  ff-GH: ffm  # Maasina Fulfulde (Ghana)
  ff-ML: ffm  # Maasina Fulfulde (Mali)
  ff-BJ: fue  # Pular (Benin)
  ff-TG: fue  # Pular (Togo)
  ff-BF: fuh  # Western Niger Fulfulde (Burkina Faso)
  ff-NE: fuh  # Western Niger Fulfulde (Niger)
  ff-NG: fuv  # Nigerian Fulfulde
  ff-CM: fub  # Adamawa Fulfulde (Cameroon)
  ff-TD: fub  # Adamawa Fulfulde (Chad)
  ff-SD: fub  # Adamawa Fulfulde (Sudan)
  ff-CF: fui  # Bagirmi Fulfulde (Central African Republic)
  gn-BO: gui  # Eastern Argentine Guaraní (Bolivia)
  hi-FJ: hif  # Fiji Hindi
  om-KE: gax  # Borana-Arsi-Guji Oromo (Kenya)
  ms-BN: kxd  # Brunei Malay
  sw-CD: swc  # Congo Swahili
  uz-AF: uzs  # Southern Uzbek (Afghanistan)
  sq-XK: aln  # Gheg Albanian (Kosovo)

# Lists of ISO 639-1/639-3 codes and ISO 15924 script codes that are
# treated as belonging to each major CJK language group.
# Used to route lookup and detection logic to the correct language handler.
CJK_LANGUAGES:
  Chinese:
    - zh  # ISO 639-1 code
    - zho  # ISO 639-3 macrolanguage
    - cdo  # Min Dong Chinese
    - cjy  # Jinyu Chinese
    - cmn  # Mandarin Chinese
    - cpx  # Pu-Xian / Putian-Quanzhou Chinese
    - czh  # Huizhou Chinese
    - czo  # Min Zhong Chinese
    - gan  # Gan Chinese
    - hak  # Hakka Chinese
    - hnm  # Hainanese
    - hsn  # Xiang Chinese
    - ltc  # Late Middle Chinese
    - luh  # Leizhou Chinese
    - lzh  # Literary Chinese (Classical)
    - mnp  # Min Bei Chinese
    - nan  # Min Nan Chinese (incl. Hokkien, Teochew)
    - och  # Old Chinese
    - sjc  # Shaojiang Chinese
    - wuu  # Wu Chinese (incl. Shanghainese)
    - yue  # Yue Chinese (incl. Cantonese)
    - Bopo  # ISO 15924 code — Bopomofo script
    - Hani  # ISO 15924 code — Han (CJK unified ideographs)
    - Hanb  # ISO 15924 code — Han with Bopomofo
    - Hans  # ISO 15924 code — Han Simplified
    - Hant  # ISO 15924 code — Han Traditional
    - unknown  # Fallback/default value
  Japanese:
    - ja  # ISO 639-1 code
    - ams  # Amami-Oshima (Southern)
    - kzg  # Kikai
    - mvi  # Miyako
    - ojp  # Old Japanese
    - okn  # Okinawan
    - ryn  # Northern Amami-Oshima
    - rys  # Yaeyama
    - ryu  # Central Okinawan
    - tkn  # Tokunoshima
    - xug  # Kunigami
    - yoi  # Yonaguni
    - yox  # Yoron
    - Hira  # ISO 15924 code — Hiragana script
    - Jpan  # ISO 15924 code — Japanese (Han + Hiragana + Katakana)
    - Kana  # ISO 15924 code — Katakana script
  Korean:
    - ko  # ISO 639-1 code
    - jje  # Jeju language
    - okm  # Middle Korean
    - oko  # Old Korean
    - Hang  # ISO 15924 code — Hangul (Jamo) script
    - Kore  # ISO 15924 code — Korean (Hangul + Han)