# Known spellings and translations of "English" in various languages.
# Used in _build_required_title_keywords: crossed with every CONNECTORS entry
# to generate all valid "English [connector] LANGUAGE" and
# "LANGUAGE [connector] English" keyword patterns for the post filter.
# Both "total" and "to_phrases" keyword lists are populated from these pairs.
# For cased alphabets, write in lowercase.
ENGLISH_ALIASES:
  - en
  - eng
  - english
  - englisch
  - inglés
  - inglês
  - inglese
  - inggris
  - anglais
  - англи́йский
  - 英语
  - 英語
  - 英文
  - 영어

# Symbols and words accepted as the directional separator between source
# and target languages in a post title.
# Used in _build_required_title_keywords: each connector is paired with
# every ENGLISH_ALIASES entry and every supported language name to build
# the full keyword lists used by main_posts_filter. The special value "to"
# also populates the "to_phrases" sublist (used for Rule 1A placement checks),
# while non-"to" connectors additionally generate no-space variants
# (e.g. "en>fr" in addition to "en > fr").
CONNECTORS:
  - '>'
  - 'to'
  - '<'  # shows up in mistakes
  - '〉'
  - '〉'
  - '›'
  - '》'
  - '»'
  - '⟶'
  - '→'
  - '~'