# This settings file stores the title settings for the bot for its
# parser and processing Ajos.

# Forms of dashed English strings that can appear in titles instead of
# ones with proper directions.
# Used in two places:
#   1. _preprocess_title: if a dash appears in the first 20 characters and
#      any of these strings match (title-cased), the dash is replaced with " > ".
#   2. _build_required_title_keywords: all entries (lowercased) are appended
#      to the "total" keyword list so dash-style titles pass the post filter.
ENGLISH_DASHES:
  - English -
  - English-
  - '-English'
  - '- English'
  - '-Eng'
  - Eng-
  - '- Eng'
  - Eng -
  - ENGLISH-
  - ENGLISH -
  - EN-
  - ENG-
  - ENG -
  - '-ENG'
  - '- ENG'
  - '-ENGLISH'
  - '- ENGLISH'

# The standard directional arrow is ">", but people may mistakenly
# use other symbols that we can account for here.
# Used in _preprocess_title: each entry is replaced with " > " to
# normalize the title before language extraction begins.
WRONG_DIRECTIONS:
  - '<'
  - '〉'
  - '›'
  - '》'
  - '»'
  - '⟶'
  - "\udcfe"
  - '&gt;'
  - '→'
  - '←'
  - '~'

# The standard brackets are "[]", but people may mistakenly use other
# form of brackets. Left and right ones are listed separately.
# Used in _preprocess_title: each left entry is replaced with " [" and
# each right entry with "] " to normalize bracket style before parsing.
WRONG_BRACKETS_LEFT:
  - ［
  - 〚
  - '【 '
  - 〔
  - 〖
  - ⟦
  - ｟
  - 《

WRONG_BRACKETS_RIGHT:
  - ］
  - 〛
  - 】
  - 〕
  - 〗
  - ⟧
  - ｠
  - 》

# These are two-letter and three-letter English words that can be
# confused for ISO language codes. We exclude them when processing the title.
# Used in _resolve_languages: after splitting a title chunk into words, any
# 2-letter word whose title-case form is in this set is dropped before
# language lookup, preventing false ISO 639-1 code matches (e.g. "it" → Italian).
# Add in title case (Title).
ENGLISH_2_WORDS:
  - Am
  - An
  - As
  - Au
  - Be
  - Br
  - El
  - He
  - Hi
  - Id
  - Io
  - Is
  - It
  - La
  - Li
  - Mi
  - Ms
  - My
  - 'No'
  - Om
  - Or
  - Se
  - So
  - Te
  - To
  - Tw
  - Uk

