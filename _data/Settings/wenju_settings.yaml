# This file stores settings for BOTH Wenju and Wenyuan.

# ─── Wenju Settings ──────────--───────────────────────────────────────

# Lines to keep in the events (logger) log before trimming.
lines_to_keep: 60000

# Alert mods about the modqueue if it exceeds this number of items.
max_queue: 7

# Number of days to average out Ziwen commands usage data in stats.
report_command_average: 3

# Alert mods if a comment goes below this limit.
controversial_score_threshold: -25

# How old (in days) a modmail conversation should be before archiving.
modmail_archival_age: 4

# How long to keep logs of resolved errors, in weeks before trimming.
resolved_error_log_retention_weeks: 1

# Language of the Day (LOTD) widget updating settings
lotd_widget_ids:
  translator: widget_1dn822a2cowgr
  languagelearning: widget_1gth0ozs9w17s

# Notification database - ignored ISO 639-1 language codes
# These codes are not needed for calculations of missing codes in the
# database as they do not map well to our requirements.
ignored_notification_database_codes:
  - bh  # Bihari (deprecated)
  - en  # English (unnecessary)

# ─── Wenyuan Settings ──────────--─────────────────────────────────────

# Calculate the Representation Index (RI) based on this world population
# as Ethnologue data is primarily from 2019.
world_population: 7770  # in millions as of 2019
# Minimum number of points a user must have to be displayed in the points table.
minimum_points_display_threshold: 25
# Exclude these users from the points table in monthly calculations.
points_exclude_usernames:
  - AutoModerator
  - translator-BOT
  - translator-ModTeam
# These are non-language specific utility codes for statistics pages
utility_codes:
  - Unknown
  - Generic
  - Nonlanguage
  - Conlang
  - Multiple Languages
